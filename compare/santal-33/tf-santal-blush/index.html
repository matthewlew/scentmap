<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<title>Santal 33 vs Santal Blush | Scentmap</title>
    <meta name="description" content="Compare Le Labo Santal 33 and Tom Ford Santal Blush. Data-driven breakdown with radar chart and note analysis.">
    <link rel="canonical" href="https://scentmap.co/compare/santal-33/tf-santal-blush">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Santal 33 vs Santal Blush | Scentmap">
    <meta property="og:description" content="Compare Le Labo Santal 33 and Tom Ford Santal Blush. Data-driven breakdown with radar chart and note analysis.">
    <meta property="og:image" content="https://scentmap.co/api/og?a=santal-33&b=tf-santal-blush">
    <meta property="og:url" content="https://scentmap.co/compare/santal-33/tf-santal-blush">
    <meta property="og:site_name" content="Scentmap">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Santal 33 vs Santal Blush | Scentmap">
    <meta name="twitter:description" content="Compare Le Labo Santal 33 and Tom Ford Santal Blush. Data-driven breakdown with radar chart and note analysis.">
    <meta name="twitter:image" content="https://scentmap.co/api/og?a=santal-33&b=tf-santal-blush">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <link rel="stylesheet" href="/styles/design-system.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/responsive.css">
</head>
<body>
  <div class="shell">
    <nav class="global-nav">
      <div class="global-nav-left">
        <a href="/" class="global-nav-logo">Scentmap</a>
        <div class="global-nav-links">
          <a href="/#discovery" class="global-nav-link">Discovery</a>
          <a href="/app#compare" class="global-nav-link">Compare</a>
          <a href="/app#notes" class="global-nav-link">Notes</a>
          <a href="/app#saved" class="global-nav-link">You</a>
        </div>
      </div>
      <div class="global-nav-right">
        <button class="nav-search-btn" onclick="openGlobalSearch()" aria-label="Quick search (⌘K)" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:var(--sp-sm); display:flex; align-items:center; justify-content:center; transition:color var(--dur-fast);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="nav-back-btn" id="nav-back-btn" hidden onclick="navBack()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:-2px;margin-right:3px" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Compare</button>
        <button class="nav-signin-btn" id="nav-signin-btn" aria-label="Sign in to your account">Sign In</button>
        <button class="settings-btn" id="settings-btn" aria-label="Settings" title="Settings" aria-haspopup="true" aria-expanded="false">⚙</button>
        <div class="settings-menu" id="settings-menu" hidden>
          <button class="settings-menu-item" onclick="settingsGo('changelog')"><span class="settings-menu-icon">↩</span>Changelog</button>
          <button class="settings-menu-item" onclick="window.open('playground.html', '_blank')"><span class="settings-menu-icon">❖</span>Design System</button>
        </div>
      </div>
    </nav>

    <div class="col-main-content">
      <div class="panel" id="p-saved" style="padding: var(--sp-lg);">
        <div id="you-journal-cta" style="margin-bottom: var(--sp-2xl);"></div>
        <div id="journal-content"></div>
        <div class="frag-main-top" style="margin-top: var(--sp-4xl); margin-bottom: var(--sp-lg); border-bottom: none;">
          <div class="frag-title-row"><span class="frag-title">Your Profile</span></div>
        </div>
        <div id="saved-list" class="scent-list"></div>
      </div>

      <div class="panel" id="p-catalog">
        <div class="catalog-shell">
          <aside class="catalog-sidebar">
            <div class="cat-search-wrap">
              <input type="text" id="cat-search" class="cat-search-input" placeholder="Search fragrances...">
              <button id="cat-search-clear" class="cat-search-clear" aria-label="Clear search">✕</button>
            </div>
            <div class="cat-sidebar-section">
              <div class="sec-label">Filters</div>
              <div class="cat-state-bar" id="cat-state-bar"></div>
            </div>
            <div class="cat-sidebar-section">
              <div class="sec-label">Family</div>
              <div class="cat-family-bar" id="cat-family-bar"></div>
            </div>
            <div class="cat-sidebar-section">
              <div class="sec-label">Feeling</div>
              <div class="cat-feel-bar" id="cat-feel-bar"></div>
            </div>
            <div class="cat-sidebar-section">
              <div class="sec-label">Houses</div>
              <div class="cat-brand-bar" id="cat-brand-bar"></div>
            </div>
          </aside>
          <main class="catalog-main">
            <div id="cat-live" class="sr-only" aria-live="polite"></div>
            <div id="cat-body"></div>
          </main>
        </div>
      </div>

      <div class="panel active" id="p-compare">
        <header class="cmp-header" id="cmp-header">
          <div class="cmp-pair-row">
            <div class="cmp-card-wrap">
              <button class="cmp-frag-card" id="cmp-card-a" aria-label="Select first fragrance">
                <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance One</div><div class="cmp-card-empty-hint">Tap to select</div></div>
                <span class="cmp-card-chevron"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              </button>
              <div class="cmp-card-meta" id="cmp-meta-a"></div>
            </div>
            <div class="cmp-vs">vs</div>
            <div class="cmp-card-wrap">
              <button class="cmp-frag-card" id="cmp-card-b" aria-label="Select second fragrance">
                <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance Two</div><div class="cmp-card-empty-hint">Tap to select</div></div>
                <span class="cmp-card-chevron"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              </button>
              <div class="cmp-card-meta" id="cmp-meta-b"></div>
            </div>
          </div>
        </header>
        <div id="cmp-results"></div>
      </div>

      <div class="panel" id="p-notes">
        <div class="notes-shell">
          <div class="notes-nav-bar" id="notes-nav-bar">
            <button class="notes-nav-btn active" data-tab="explore">Explore</button>
            <button class="notes-nav-btn" data-tab="search">Search & A-Z</button>
            <button class="notes-nav-btn" data-tab="saved">My Notes</button>
          </div>
          <div class="notes-search-wrap" id="notes-search-wrap" style="display:none">
            <div class="cat-search-wrap">
              <input type="text" id="notes-search" class="cat-search-input" placeholder="Search notes...">
              <button id="notes-search-clear" class="cat-search-clear" style="display:none">✕</button>
            </div>
            <div class="cat-sidebar-section" id="notes-tier-filter-wrap" style="display:none; margin-top:var(--sp-md)">
              <div class="notes-tier-bar" id="notes-tier-bar">
                <button class="tab active" data-tier="all">All Tiers</button>
                <button class="tab" data-tier="top">Top</button>
                <button class="tab" data-tier="mid">Heart</button>
                <button class="tab" data-tier="base">Base</button>
              </div>
            </div>
          </div>
          <div id="notes-count" class="notes-count-summary"></div>
          <div id="notes-body"></div>
        </div>
      </div>

      <div class="panel" id="p-changelog" style="padding: var(--sp-lg);">
        <div class="changelog-container">
          <h1 class="text-title">Changelog</h1>
          <div id="changelog-body" class="changelog-body"></div>
        </div>
      </div>
    </div>

    <div class="col-detail" id="col-detail">
      <button class="detail-close-btn" onclick="closeDesktopDetail()" aria-label="Close details">✕</button>
      <div id="col-detail-content"></div>
    </div>
  </div>

  <div id="sheet-stack"></div>
  <div class="note-float-overlay" id="note-float-overlay">
    <div class="note-float-bg" id="note-float-bg"></div>
    <div class="note-popup" id="note-popup" role="dialog" aria-labelledby="np-name">
      <button class="nfp-close" id="nfp-close" aria-label="Close note info">✕</button>
      <div class="np-family" id="np-family"></div>
      <div class="np-name" id="np-name"></div>
      <div class="np-desc" id="np-desc"></div>
      <div id="np-save" style="margin-bottom:var(--sp-lg)"></div>
      <div class="np-extra" id="np-extraction" style="display:none">
        <div class="sec-label">Extraction</div>
        <div class="np-extra-text" id="np-extraction-text"></div>
      </div>
      <div class="np-extra" id="np-fact" style="display:none">
        <div class="sec-label">Insider Fact</div>
        <div class="np-extra-text" id="np-fact-text"></div>
      </div>
      <div id="np-frags"></div>
    </div>
  </div>

  <div id="frag-picker" class="frag-picker-overlay">
    <div class="frag-picker-wrap" role="dialog" aria-modal="true" aria-label="Select fragrance">
      <div class="frag-picker-header">
        <div class="frag-picker-sort-bar" id="frag-picker-sort-bar">
          <div class="frag-picker-sort-pill" id="frag-picker-sort-pill"></div>
          <button class="frag-picker-sort-btn active" data-sort="brand">House</button>
          <button class="frag-picker-sort-btn" data-sort="name">A–Z</button>
          <button class="frag-picker-sort-btn" data-sort="family">Family</button>
        </div>
        <button class="frag-picker-close" id="frag-picker-close">✕</button>
      </div>
      <div class="frag-picker-cols" id="frag-picker-cols">
        <div class="frag-picker-col" id="frag-picker-col-a">
          <div class="cat-search-wrap"><input type="text" id="frag-picker-search-a" class="cat-search-input" placeholder="Search..."></div>
          <div class="frag-picker-list" id="frag-picker-list-a" role="listbox"></div>
        </div>
        <div class="frag-picker-col" id="frag-picker-col-b">
          <div class="cat-search-wrap"><input type="text" id="frag-picker-search-b" class="cat-search-input" placeholder="Search..."></div>
          <div class="frag-picker-list" id="frag-picker-list-b" role="listbox"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="app-loading" id="app-loading">
    <div class="app-loading-inner">
      <div class="app-loading-dot"></div>
      <div class="app-loading-text">Building Engine...</div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
