<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scentmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=DM+Sans:ital,opsz,wght@0,9..40,200..900;1,9..40,200..900&display=swap" rel="stylesheet">
<script>
  window._hapticImpl = type => { try { if(type==='medium')navigator.vibrate?.([25]); else if(type==='success')navigator.vibrate?.([15,50,30]); } catch(e){} };
  window.haptic = type => window._hapticImpl(type);
</script>
<script type="module">
  import { WebHaptics } from 'https://esm.sh/web-haptics@0.0.6';
  const _h = new WebHaptics();
  window._hapticImpl = type => { try { _h.trigger(type); } catch(e) {} };
</script>
<link rel="stylesheet" href="styles/design-system.css?v=20260312a">
<link rel="stylesheet" href="styles/components.css?v=20260312a">
<link rel="stylesheet" href="styles/layout.css?v=20260312a">
<link rel="stylesheet" href="styles/responsive.css?v=20260312a">
</head>
<body>
<div class="shell">

  <!-- MIDDLE: MAIN -->
  <div class="col-main">
    <div class="col-main-nav">
      <span class="nav-logo-text">Scentmap</span>
      <div class="nav-right" id="nav-right">
        <button class="nav-back-btn" id="nav-back-btn" hidden onclick="navBack()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:-2px;margin-right:3px" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Compare</button>
        <button class="settings-btn" id="settings-btn" aria-label="Settings" title="Settings">⚙</button>
        <div class="settings-menu" id="settings-menu" hidden>
          <button class="settings-menu-item" onclick="settingsGo('changelog')"><span class="settings-menu-icon">↩</span>Changelog</button>
        </div>
      </div>
    </div>
    <div class="col-main-content">

      <div class="panel" id="p-catalog">
        <div class="frag-layout">
          <aside class="frag-sidebar" id="frag-sidebar">
            <div class="frag-sb-head">Filters</div>
            <div class="cat-state-bar" id="cat-state-bar"></div>
            <div class="frag-sb-divider"></div>
            <div class="frag-sb-label">Brand</div>
            <div class="cat-brand-bar" id="cat-brand-bar"></div>
          </aside>
          <div class="frag-main">
            <div class="frag-main-top">
              <div class="frag-title-row">
                <span class="frag-title">Fragrances</span>
                <span class="sub" id="cat-count"></span>
              </div>
              <div class="cat-search-wrap">
                <input type="search" id="cat-search" class="cat-search-input" placeholder="Search fragrances, brands, notes…" autocomplete="off">
                <button class="cat-search-clear" id="cat-search-clear" aria-label="Clear search">✕</button>
              </div>
              <button class="frag-filter-toggle" id="frag-filter-toggle">⊞ Filters</button>
            </div>
            <div class="frag-mobile-panel" id="frag-mobile-panel">
              <div class="cat-state-bar-m" id="cat-state-bar-m"></div>
              <div class="cat-brand-bar-m" id="cat-brand-bar-m"></div>
            </div>
            <div id="cat-body"></div>
          </div>
        </div>
      </div>

      <div class="panel" id="p-notes">
        <div class="sec-label">Notes <span class="sub" id="notes-count"></span></div>
        <div id="notes-body"></div>
      </div>

      <div class="panel" id="p-changelog">
        <div class="sec-label">Changelog</div>
        <div id="changelog-body" class="changelog-body"></div>
      </div>

      <div class="panel active" id="p-compare">
        <div class="cmp-picker-labels">
          <span class="cmp-picker-label-txt">Fragrance 1</span>
          <span class="cmp-picker-label-txt">Fragrance 2</span>
        </div>
        <div class="cmp-header-v2" id="cmp-header">
          <div class="cmp-frag-card cmp-card-slot" id="cmp-card-a" data-slot="a" role="button" tabindex="0" aria-label="Select fragrance one">
            <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance One</div><div class="cmp-card-empty-hint">Tap to select</div></div>
            <span class="cmp-card-chevron" aria-hidden="true"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
          <div class="cmp-frag-card cmp-card-slot" id="cmp-card-b" data-slot="b" role="button" tabindex="0" aria-label="Select fragrance two">
            <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance Two</div><div class="cmp-card-empty-hint">Tap to select</div></div>
            <span class="cmp-card-chevron" aria-hidden="true"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
        <div id="cmp-results"></div>
      </div>

    </div>
  </div>

  <!-- RIGHT: DETAIL PANEL/SIDESHEET -->
  <div class="col-detail" id="col-detail">
    <div class="detail-topbar">
      <button class="detail-back" id="detail-back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:-2px;margin-right:2px" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</button>
      <button class="detail-close-btn" id="detail-close-btn">Close</button>
    </div>
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<div class="detail-scrim" id="detail-scrim"></div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-bottomnav" id="mobile-bottomnav" role="navigation" aria-label="Main navigation">
  <button class="mbn-btn active" onclick="goMobile('catalog',this)" aria-label="Fragrances"><span class="mbn-icon" aria-hidden="true">≡</span>Fragrances</button>
  <button class="mbn-btn" onclick="goMobile('compare',this)" aria-label="Compare"><span class="mbn-icon" aria-hidden="true">⊕</span>Compare</button>
  <button class="mbn-btn mbn-more" onclick="openMoreSheet(this)" aria-label="More"><span class="mbn-icon" aria-hidden="true">⋯</span>More</button>
</div>

<!-- MOBILE SHEET STACK -->
<div class="sheet-stack-overlay" id="sheet-stack">
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
</div>

<!-- NOTE FLOAT -->
<div class="note-float-overlay" id="note-float-overlay" role="dialog" aria-modal="true" aria-labelledby="np-name">
  <div class="note-float-bg" id="note-float-bg"></div>
  <div class="note-popup" id="note-popup">
    <div class="nfp-header">
      <div class="np-name" id="np-name"></div>
      <button class="nfp-close" id="nfp-close" aria-label="Close note">✕</button>
    </div>
    <div class="np-family" id="np-family"></div>
    <div class="np-desc"   id="np-desc"></div>
    <div class="np-extraction" id="np-extraction" style="display:none; margin-top:10px; font-size:12px; color:var(--g500);">
      <strong>Extraction:</strong> <span id="np-extraction-text"></span>
    </div>
    <div class="np-fact" id="np-fact" style="display:none; margin-top:8px; padding:10px; background:var(--g50); border-radius:6px; font-size:12px; color:var(--g600); border:1px solid var(--g200);">
      <strong style="display:block; margin-bottom:4px; color:var(--g900);">Perfumer's Insight</strong>
      <span id="np-fact-text"></span>
    </div>
    <div class="np-frags"  id="np-frags"></div>
  </div>
</div>

<!-- FRAGRANCE PICKER — dual-column drum rolodex -->
<div class="frag-picker-overlay" id="frag-picker" role="dialog" aria-modal="true" aria-label="Select fragrances">
  <div class="frag-picker-wrap">
    <div class="frag-picker-top">
      <div class="frag-picker-sort-row">
        <span class="frag-picker-sort-label">Sort by</span>
        <div class="frag-picker-sort-bar" id="frag-picker-sort-bar" role="group" aria-label="Sort order">
          <button class="frag-picker-sort-btn active" data-sort="brand" aria-pressed="true">Brand</button>
          <button class="frag-picker-sort-btn" data-sort="name" aria-pressed="false">Fragrance Title</button>
          <button class="frag-picker-sort-btn" data-sort="family" aria-pressed="false">Note Family</button>
          <div class="frag-picker-sort-pill" id="frag-picker-sort-pill" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <div class="frag-picker-cols" id="frag-picker-cols">
      <div class="frag-picker-col" id="frag-picker-col-a" data-slot="a">
        <div class="frag-picker-col-hdr">
          <span class="frag-picker-col-lbl">Fragrance 1</span>
          <input class="frag-picker-search" id="frag-picker-search-a" type="text" placeholder="Search…" autocomplete="off" aria-label="Search fragrance one">
        </div>
        <div class="frag-picker-list-outer">
          <div class="frag-picker-list" id="frag-picker-list-a" role="listbox" tabindex="0" aria-label="Fragrance 1 options"></div>
        </div>
      </div>
      <div class="frag-picker-col-divider"></div>
      <div class="frag-picker-col" id="frag-picker-col-b" data-slot="b">
        <div class="frag-picker-col-hdr">
          <span class="frag-picker-col-lbl">Fragrance 2</span>
          <input class="frag-picker-search" id="frag-picker-search-b" type="text" placeholder="Search…" autocomplete="off" aria-label="Search fragrance two">
        </div>
        <div class="frag-picker-list-outer">
          <div class="frag-picker-list" id="frag-picker-list-b" role="listbox" tabindex="0" aria-label="Fragrance 2 options"></div>
        </div>
      </div>
    </div>
    <div class="frag-picker-footer">
      <button class="frag-picker-close" id="frag-picker-close" aria-label="Close fragrance picker">Done</button>
    </div>
  </div>
</div>

<script src="js/app.js?v=20260312a"></script>
</body>
</html>
