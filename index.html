<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,input,select,textarea{font-family:inherit;font-size:inherit}
:root{
  --black:#0a0a0a;
  --g700:#333;
  --g600:#555;
  --g500:#666;
  --g450:#767676;
  --g400:#888;
  --g300:#bbb;
  --g200:#e2e2e2;
  --g100:#f4f4f4;
  --white:#fff;
  --wish:#9A4E10;
  --col-capsule:280px;
  --col-detail:340px;
  --chart-max:520px;
}
html,body{background:#fff;color:#0a0a0a}
html{font-size:16px}
body{font-family:"Source Serif 4",Georgia,serif;
  line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ══ SHELL ═══════════════════════════════════════════════════ */
.shell{display:flex;min-height:100vh;max-width:1400px;margin:0 auto}

/* LEFT: capsule — no right border */
.col-capsule{
  width:var(--col-capsule);flex-shrink:0;
  border-right:none;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.capsule-col-inner{padding:16px 16px 60px;border-right:1px solid var(--black)}

/* MIDDLE: main — always fills remaining width */
.col-main{flex:1;min-width:0;display:flex;flex-direction:column}
.col-main-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px 10px;border-bottom:1px solid var(--black);
  position:sticky;top:0;background:#fff;z-index:50;
}
.col-main-content{padding:20px 20px 80px}

/* RIGHT: detail panel — desktop: in-flow third column */
/* Desktop ≥1100px: true panel, no overlay */
@media(min-width:1100px){
  .col-detail{
    width:0;flex-shrink:0;overflow:hidden;
    border-left:0px solid var(--black);
    transition:width .28s cubic-bezier(.16,1,.3,1), border-left-width .28s;
    position:sticky;top:0;height:100vh;overflow-y:auto;
    display:flex;flex-direction:column;
  }
  .col-detail.open{
    width:var(--col-detail);
    border-left:1px solid var(--black);
    overflow-y:auto;
  }
  .detail-scrim{display:none!important}
}

/* Tablet 768–1099px: fixed sidesheet with scrim */
@media(min-width:768px) and (max-width:1099px){
  .col-detail{
    position:fixed;top:0;right:0;bottom:0;
    width:var(--col-detail);
    background:#fff;border-left:1px solid var(--black);
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.16,1,.3,1);
    z-index:80;display:flex;flex-direction:column;
  }
  .col-detail.open{transform:translateX(0)}
  .detail-scrim{
    position:fixed;inset:0;z-index:79;
    background:rgba(0,0,0,.18);
    opacity:0;pointer-events:none;transition:opacity .22s;
  }
  .detail-scrim.open{opacity:1;pointer-events:all}
}

/* Mobile <768px: stacked layout */
@media(max-width:767px){
  html{font-size:18px}
  body{line-height:1.65}
  .shell{flex-direction:column;min-height:auto}
  .col-capsule{
    width:100%;height:auto;position:static;
    border-right:none;overflow-y:visible;
  }
  .capsule-col-inner{
    border-right:none;border-bottom:1px solid var(--black);
    padding:18px 16px 24px;
  }
  .col-main{min-height:auto}
  .col-main-nav{
    padding:12px 16px 10px;position:static;
  }
  .col-main-content{padding:18px 16px 80px}
  .col-detail{display:none!important}
  .detail-scrim{display:none!important}
  
  /* Larger tap targets on mobile */
  .tab{font-size:.85rem;padding:8px 12px;min-height:44px;display:inline-flex;align-items:center}
  .tabs{gap:3px;padding:4px}
  .logo{font-size:.9rem}
  .capsule-tagline{font-size:.78rem;line-height:1.5;margin-bottom:16px}
  
  /* Capsule grid improvements */
  .capsule-grid{grid-template-columns:1fr 1fr;gap:0}
  .cap-cell{min-height:150px;padding:14px 12px}
  .cap-role{font-size:.75rem}
  .cap-desc-short{font-size:.68rem;margin-bottom:8px}
  .cap-sym{font-size:1.4rem;margin-bottom:8px}
  .cap-primary{font-size:.85rem}
  .cap-frag-brand{font-size:.7rem}
  .cap-assign-cta{font-size:.75rem;gap:5px;margin-top:4px}
  .cap-plus{width:16px;height:16px;font-size:.8rem}
  .cap-count{font-size:.65rem;top:8px;right:8px}
  
  /* Catalog improvements */
  .sec-label{font-size:.8rem;margin-bottom:15px}
  .sec-label .sub{font-size:.8rem}
  .brand-n{font-size:.8rem}
  .brand-c{font-size:.78rem}
  .cat-legend{gap:12px;margin-bottom:14px}
  .cl-item{font-size:.8rem;gap:6px}
  .cl-box{width:16px;height:16px;font-size:.7rem}
  .scent-row{gap:10px;padding:12px 13px;min-height:66px}
  .s-check{width:18px;height:18px;font-size:.73rem;flex-shrink:0}
  .s-fdot{width:8px;height:8px}
  .s-name-btn{font-size:.92rem;line-height:1.4}
  .s-meta{font-size:.76rem;margin-top:2px}
  .s-sym{font-size:.88rem}
  
  /* Roles tab improvements */
  .rs{padding:20px 0 24px}
  .rs-sym{font-size:1.15rem}
  .rs-name{font-size:1rem}
  .rs-meta{font-size:.75rem}
  .rs-tagline{font-size:.82rem;margin-bottom:8px}
  .rs-body{font-size:.82rem;line-height:1.7;padding-left:10px}
  .fam-chip{font-size:.73rem;padding:3px 7px 3px 5px}
  .fam-dot{width:7px;height:7px}
  .chart-outer{margin-left:40px}
  .y-title{left:-38px;font-size:.67rem}
  .y-labels{left:-38px}
  .y-lbl{font-size:.63rem;width:35px}
  .x-labels{font-size:.63rem;padding:4px 0 3px}
  .x-title{font-size:.67rem;margin-top:3px}
  .dot-c{width:11px;height:11px}
  .dot-lbl{font-size:.68rem}
  .axis-glossary{font-size:.82rem;line-height:1.75;margin-top:28px;padding-top:18px}
  
  /* Notes tab improvements */
  .notes-family-row{padding:10px 0}
  .nf-left{width:100px;gap:7px}
  .nf-dot{width:9px;height:9px}
  .nf-name{font-size:.88rem}
  .note-link{font-size:.88rem;line-height:1.85;padding:2px 0}
  
  /* Changelog improvements */
  .changelog-body{font-size:.92rem;line-height:1.7}
  .changelog-body h2{font-size:.8rem;margin:30px 0 15px;padding-bottom:8px}
  .changelog-body h3{font-size:.82rem;margin:18px 0 9px}
  .changelog-body li{margin:5px 0}
}

.detail-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;flex-shrink:0;
  border-bottom:1px solid var(--g200);
}
.detail-back{
  display:flex;align-items:center;gap:3px;font-size:.78rem;color:var(--g500);
  background:none;border:none;cursor:pointer;padding:0;transition:color .12s;
  visibility:hidden;min-width:52px;
}
.detail-back.visible{visibility:visible}
.detail-back:hover{color:var(--black)}
.detail-close-btn{
  font-size:.8rem;color:var(--g500);background:none;border:none;
  cursor:pointer;padding:3px 0;transition:color .12s;
}
.detail-close-btn:hover{color:var(--black)}
.detail-inner{padding:16px 18px 60px;flex:1;overflow-y:auto}

/* ══ TABS (shared pattern) ════════════════════════════════════ */
.tabs{display:flex;gap:2px;background:var(--g100);border-radius:8px;padding:3px}
.tab{
  font-size:.76rem;font-weight:500;color:var(--g500);
  background:none;border:none;cursor:pointer;
  padding:5px 9px;border-radius:5px;white-space:nowrap;
  transition:color .12s,background .12s;
}
.tab:hover{color:var(--black)}
.tab.active{color:var(--black);background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* ══ NAV LOGO ═════════════════════════════════════════════════ */
.logo{font-size:.82rem;font-weight:400;letter-spacing:.04em;font-style:italic}

/* ══ PANELS ═══════════════════════════════════════════════════ */
.panel{display:none}
.panel.active{display:block}

/* ══ CHANGELOG ════════════════════════════════════════════════ */
.changelog-body{max-width:640px;font-size:.875rem;line-height:1.65}
.changelog-body h2{font-size:.72rem;font-weight:600;letter-spacing:.01em;color:var(--g450);margin:28px 0 14px;padding-bottom:7px;border-bottom:1px solid var(--g200)}
.changelog-body h2:first-child{margin-top:0}
.changelog-body h3{font-size:.75rem;font-weight:600;letter-spacing:.01em;color:var(--g600);margin:16px 0 8px}
.changelog-body ul{padding-left:1.2em;margin:0 0 10px}
.changelog-body li{margin:4px 0;color:var(--g700)}
.changelog-body hr{border:none;border-top:1px solid var(--g200);margin:28px 0}
.changelog-body p{margin:0 0 10px;color:var(--g700)}
.changelog-body strong{color:var(--black);font-weight:600}
.sec-label{
  font-size:.72rem;font-weight:600;letter-spacing:.02em;
  color:var(--g450);margin-bottom:13px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-label .sub{font-weight:400;color:var(--g450);letter-spacing:0;text-transform:none;font-size:.74rem}

/* ══ CAPSULE ══════════════════════════════════════════════════ */
.capsule-tagline{font-size:.7rem;color:var(--g500);line-height:1.45;margin-bottom:14px}
.capsule-grid{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--black);border-left:1px solid var(--black);
}
.cap-cell{
  border-right:1px solid var(--black);border-bottom:1px solid var(--black);
  padding:11px 10px;display:flex;flex-direction:column;
  align-items:center;text-align:center;min-height:130px;
  background:#fff;cursor:pointer;transition:background .12s;
  position:relative;
}
.cap-cell:hover{background:var(--g100)}
.cap-role{font-size:.68rem;font-weight:600;color:var(--g500);margin-bottom:1px}
.cap-desc-short{font-size:.61rem;color:var(--g450);margin-bottom:7px;line-height:1.3}
.cap-sym{font-size:1.25rem;line-height:1;margin-bottom:7px}
.cap-frag-wrap{width:100%}
.cap-primary{font-size:.78rem;font-weight:600;line-height:1.2;margin-bottom:1px}
.cap-primary.is-wish::before{content:'~';color:var(--wish);margin-right:1px}
.cap-frag-brand{font-size:.63rem;color:var(--g450)}
/* stacked secondary fragrances */
.cap-more{font-size:.6rem;color:var(--g450);margin-top:3px;font-style:italic}
.cap-cell.empty .cap-sym{opacity:.13;color:var(--g400)!important}
.cap-cell.empty .cap-role,.cap-cell.empty .cap-desc-short{color:var(--g450)}
.cap-assign-cta{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--g450);margin-top:3px}
.cap-plus{width:14px;height:14px;border-radius:50%;border:1px solid var(--g300);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--g400);line-height:1}
/* count badge */
.cap-count{position:absolute;top:6px;right:7px;font-size:.58rem;color:var(--g450);font-weight:600}

/* ══ CATALOG ══════════════════════════════════════════════════ */
.cat-section{margin-bottom:22px}
.brand-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:7px;border-bottom:1px solid var(--black);margin-bottom:9px}
.brand-n{font-size:.72rem;font-weight:600;letter-spacing:.01em}
.brand-c{font-size:.7rem;color:var(--g450)}
.scent-list{border:1px solid var(--black);border-radius:7px;overflow:hidden}
.scent-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 11px;background:#fff;border-bottom:1px solid var(--g200);
  transition:background .1s;
}
.scent-row:last-child{border-bottom:none}
.scent-row:hover{background:var(--g100)}
.s-check{
  width:14px;height:14px;flex-shrink:0;border-radius:3px;
  border:1px solid var(--g300);background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;
  font-size:.66rem;font-weight:700;color:transparent;
}
.scent-row.s-wish .s-check{border-color:var(--wish);color:var(--wish)}
.scent-row.s-owned .s-check{border-color:var(--black);background:var(--black);color:#fff}
.s-fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-name-btn{
  font-size:.84rem;font-weight:500;background:none;border:none;padding:0;
  cursor:pointer;color:var(--black);text-align:left;
  text-decoration:underline;text-underline-offset:2px;
  text-decoration-color:var(--g300);transition:text-decoration-color .12s;display:block;
}
.s-name-btn:hover{text-decoration-color:var(--black)}
.scent-row.s-wish  .s-name-btn{font-weight:600}
.scent-row.s-wish  .s-name-btn::before{content:'~';color:var(--wish);margin-right:1px}
.scent-row.s-owned .s-name-btn{font-weight:700}
.s-meta{font-size:.68rem;color:var(--g500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-syms{display:flex;gap:2px;flex-shrink:0}
.s-sym{font-size:.78rem;color:var(--g300);line-height:1}
.scent-row.s-owned .s-sym{color:var(--black)}
.scent-row.s-wish  .s-sym{color:var(--wish)}
.cat-legend{display:flex;gap:11px;margin-bottom:12px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--g500)}
.cl-box{width:13px;height:13px;border-radius:3px;border:1px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700}

/* ══ ROLES ════════════════════════════════════════════════════ */
.rs{padding:18px 0 22px;border-bottom:1px solid var(--g200)}
.rs:last-child{border-bottom:none}
.rs-head{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.rs-sym{font-size:1.05rem;line-height:1;flex-shrink:0}
.rs-name{font-size:.92rem;font-weight:700;letter-spacing:-.02em}
.rs-meta{font-size:.68rem;color:var(--g450);margin-left:auto;white-space:nowrap}
.rs-tagline{font-size:.74rem;color:var(--g500);font-style:italic;margin-bottom:6px}
.rs-body{font-size:.74rem;color:var(--g500);line-height:1.65;margin-bottom:11px;border-left:2px solid var(--g200);padding-left:9px}
.fam-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.fam-chip{display:flex;align-items:center;gap:3px;font-size:.66rem;color:var(--g600);padding:2px 6px 2px 4px;border-radius:20px;border:1px solid var(--g200)}
.fam-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Chart — max-width on desktop */
.chart-section{max-width:var(--chart-max)}
.chart-outer{position:relative;margin-left:48px;margin-right:4px}
.y-title{position:absolute;left:-46px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:.6rem;font-weight:500;letter-spacing:.02em;color:var(--g450);white-space:nowrap;pointer-events:none}
.y-labels{position:absolute;left:-46px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.y-lbl{font-size:.57rem;color:var(--g450);text-align:right;width:40px;line-height:1}
.chart-area{
  position:relative;width:100%;padding-bottom:74%;
  border-left:1px solid var(--black);border-bottom:1px solid var(--black);
  background:#fff;overflow:visible;
}
.chart-area::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(to right, var(--g100) 0 1px,transparent 1px 10%),
    repeating-linear-gradient(to bottom,var(--g100) 0 1px,transparent 1px 10%);
}
.x-labels{display:flex;justify-content:space-between;padding:3px 0 2px;font-size:.57rem;color:var(--g450)}
.x-title{font-size:.6rem;font-weight:500;letter-spacing:.02em;color:var(--g450);text-align:center;margin-top:2px}

/* Dots */
.dot{position:absolute;transform:translate(-50%,50%);cursor:pointer;z-index:10}
.dot-c{
  width:10px;height:10px;border-radius:50%;
  border:2px solid rgba(255,255,255,.85);margin:0 auto;
  box-shadow:0 0 0 1px rgba(0,0,0,.2);
  transition:transform .15s;position:relative;z-index:2;
}
.dot:hover{z-index:30}
.dot:hover .dot-c{transform:scale(2.2)}
.dot.s-wish .dot-c{background:#fff!important}
.dot-lbl{
  position:absolute;
  font-size:.61rem;font-weight:500;color:var(--black);
  white-space:nowrap;background:rgba(255,255,255,.94);
  padding:1px 3px;border-radius:2px;
  pointer-events:none;z-index:1;line-height:1.3;
}
.dot-lbl.lbl-above{bottom:calc(100% + 5px);left:50%;transform:translateX(-50%)}
.dot-lbl.lbl-below{top:calc(100% + 5px);left:50%;transform:translateX(-50%)}
.dot-lbl.lbl-left{right:calc(100% + 6px);top:50%;transform:translateY(-50%)}
.dot-lbl.lbl-right{left:calc(100% + 6px);top:50%;transform:translateY(-50%)}
.dot:hover .dot-lbl{z-index:31}

.axis-glossary{margin-top:26px;padding-top:16px;border-top:1px solid var(--g200);font-size:.74rem;color:var(--g500);line-height:1.7;max-width:var(--chart-max)}
.axis-glossary strong{color:var(--black)}

/* ══ NOTES ════════════════════════════════════════════════════ */
.notes-family-row{display:flex;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--g200)}
.notes-family-row:last-child{border-bottom:none}
.nf-left{display:flex;align-items:center;gap:6px;width:90px;flex-shrink:0;padding-top:2px}
.nf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nf-name{font-size:.8rem;font-weight:500}
.nf-right{flex:1;display:flex;flex-direction:column}
.note-link{
  font-size:.8rem;color:var(--black);
  text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--g300);
  cursor:pointer;line-height:1.75;background:none;border:none;padding:0;text-align:left;
  transition:text-decoration-color .12s;display:inline-block;
}
.note-link:hover{text-decoration-color:var(--black)}

/* ══ DETAIL CONTENT ═══════════════════════════════════════════ */
/* Fragrance name/brand */
.dc-name{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:2px}
.dc-brand{font-size:.76rem;color:var(--g500);margin-bottom:12px}

/* State tabs — reuse .tabs / .tab */
.dc-state-wrap{margin-bottom:13px}

.dc-ftag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;color:#fff;margin-bottom:12px}
.dc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.dc-stat{background:var(--g100);border-radius:6px;padding:8px 10px}
.dc-slbl{font-size:.63rem;font-weight:600;letter-spacing:.01em;color:var(--g500);margin-bottom:4px}
.dc-bar{height:3px;background:var(--g200);border-radius:2px;margin-bottom:4px;overflow:hidden}
.dc-fill{height:100%;background:var(--black);border-radius:2px}
.dc-sval{font-size:.72rem;color:var(--g500)}
.dc-div{height:1px;background:var(--g200);margin:11px 0}
.dc-nlbl{font-size:.63rem;font-weight:600;letter-spacing:.01em;color:var(--g500);margin-bottom:7px}
.dc-note{display:flex;gap:6px;margin-bottom:5px}
.dc-nt{font-size:.63rem;font-weight:600;letter-spacing:.01em;color:var(--g400);width:24px;flex-shrink:0;padding-top:3px}
.dc-nv{font-size:.78rem;color:var(--g600);line-height:1.7}
.dc-nv .note-link{font-size:.78rem}

/* Role assignment chips */
.dc-roles-lbl{font-size:.63rem;font-weight:600;letter-spacing:.01em;color:var(--g500);margin:12px 0 7px}
.dc-role-chips{display:flex;flex-wrap:wrap;gap:5px}
.dc-role-chip{
  display:inline-flex;align-items:center;gap:4px;
  border:1px solid var(--g200);border-radius:20px;
  padding:4px 10px;font-size:.74rem;color:var(--g500);
  background:#fff;cursor:pointer;transition:all .14s;
  user-select:none;
}
.dc-role-chip:hover{border-color:var(--g400);color:var(--black)}
/* primary assignment */
.dc-role-chip.assigned-primary{
  background:var(--black);color:#fff;border-color:var(--black);
}
/* secondary (2nd, 3rd) */
.dc-role-chip.assigned-secondary{
  background:var(--g100);color:var(--black);border-color:var(--g400);
  font-weight:600;
}
.dc-role-chip .chip-sym{font-size:.88rem;line-height:1}
.dc-role-chip .chip-order{font-size:.58rem;opacity:.7;margin-left:1px}
