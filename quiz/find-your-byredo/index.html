<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<title>Find Your Byredo — Quiz | Scentmap</title>
    <meta name="description" content="Which Byredo fragrance is your match? 3 quick questions to find your signature scent from Byredo's full lineup.">
    <link rel="canonical" href="https://scentmap.vercel.app/quiz/find-your-byredo">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Which Byredo Is Right for You?">
    <meta property="og:description" content="Which Byredo fragrance is your match? 3 quick questions to find your signature scent from Byredo's full lineup.">
    <meta property="og:image" content="https://scentmap.vercel.app/api/og-quiz?quiz=find-your-byredo">
    <meta property="og:url" content="https://scentmap.vercel.app/quiz/find-your-byredo">
    <meta property="og:site_name" content="Scentmap">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Which Byredo Is Right for You?">
    <meta name="twitter:description" content="Which Byredo fragrance is your match? 3 quick questions to find your signature scent from Byredo's full lineup.">
    <meta name="twitter:image" content="https://scentmap.vercel.app/api/og-quiz?quiz=find-your-byredo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  
  
  
  
  
  
  
  
  
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=DM+Sans:ital,opsz,wght@0,9..40,200..900;1,9..40,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/design-system.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/responsive.css">
</head>
<body>
  <div class="shell">
    <nav class="global-nav">
      <div class="global-nav-left">
        <a href="/" class="global-nav-logo">Scentmap</a>
        <div class="global-nav-links">
          <a href="/app.html#catalog" class="global-nav-link">Discovery</a>
          <button class="global-nav-link active" onclick="go('compare', this)">Compare</button>
          <button class="global-nav-link" onclick="go('notes', this)">Notes</button>
          <button class="global-nav-link" onclick="go('saved', this)">You</button>
        </div>
      </div>
      <div class="global-nav-right">
        <button class="nav-search-bar" onclick="openGlobalSearch()" aria-label="Quick search (⌘K)">
          <svg class="nav-search-bar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span class="nav-search-bar-text">Search...</span>
          <kbd class="nav-search-bar-kbd">⌘K</kbd>
        </button>
        <button class="nav-back-btn" id="nav-back-btn" hidden onclick="navBack()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:-2px;margin-right:3px" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Compare</button>
        <button class="nav-signin-btn" id="nav-signin-btn" aria-label="Sign in to your account">Sign In</button>
        <button class="settings-btn" id="settings-btn" aria-label="Settings" title="Settings" aria-haspopup="true" aria-expanded="false">⚙</button>
        <div class="settings-menu" id="settings-menu" hidden>
          <button class="settings-menu-item" onclick="settingsGo('changelog')"><span class="settings-menu-icon">↩</span>Changelog</button>
          <button class="settings-menu-item" onclick="window.open('/designsystem.html', '_blank')"><span class="settings-menu-icon">❖</span>Design System</button>
        </div>
      </div>
    </nav>

    <div class="content-row">
      <div class="col-main">
        <div class="col-main-content">
          <div class="panel" id="p-saved">
            <h1 class="text-heading">Your Profile</h1>
            <div id="you-journal-cta"></div>
            <div id="journal-content"></div>
            <div id="saved-list" class="scent-list"></div>
          </div>

          <div class="panel" id="p-catalog">
            <div class="catalog-shell">
              <aside class="catalog-sidebar">
                <div class="cat-search-wrap">
                  <input type="text" id="cat-search" class="cat-search-input" placeholder="Search fragrances...">
                  <button id="cat-search-clear" class="cat-search-clear" aria-label="Clear search">✕</button>
                </div>
                <div class="cat-sidebar-section">
                  <div class="sec-label">Filters</div>
                  <div class="cat-state-bar" id="cat-state-bar"></div>
                </div>
                <div class="cat-sidebar-section">
                  <div class="sec-label">Family</div>
                  <div class="cat-family-bar" id="cat-family-bar"></div>
                </div>
                <div class="cat-sidebar-section">
                  <div class="sec-label">Feeling</div>
                  <div class="cat-feel-bar" id="cat-feel-bar"></div>
                </div>
                <div class="cat-sidebar-section">
                  <div class="sec-label">Houses</div>
                  <div class="cat-brand-bar" id="cat-brand-bar"></div>
                </div>
              </aside>
              <main class="catalog-main">
                <div id="cat-live" class="sr-only" aria-live="polite"></div>
                <div id="cat-body"></div>
              </main>
            </div>
          </div>

          <div class="panel active" id="p-compare">
            <header class="cmp-header" id="cmp-header">
              <div class="cmp-pair-row">
                <div class="cmp-card-wrap">
                  <button class="cmp-frag-card" id="cmp-card-a" aria-label="Select first fragrance">
                    <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance One</div><div class="cmp-card-empty-hint">Tap to select</div></div>
                    <span class="cmp-card-chevron"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                  </button>
                  <div class="cmp-card-meta" id="cmp-meta-a"></div>
                </div>
                <div class="cmp-vs">vs</div>
                <div class="cmp-card-wrap">
                  <button class="cmp-frag-card" id="cmp-card-b" aria-label="Select second fragrance">
                    <div class="cmp-card-empty"><div class="cmp-card-empty-lbl">Fragrance Two</div><div class="cmp-card-empty-hint">Tap to select</div></div>
                    <span class="cmp-card-chevron"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                  </button>
                  <div class="cmp-card-meta" id="cmp-meta-b"></div>
                </div>
              </div>
            </header>
            <div id="cmp-results"></div>
          </div>

          <div class="panel" id="p-notes">
            <div class="notes-shell">
              <div class="notes-nav-bar" id="notes-nav-bar">
                <button class="notes-nav-btn active" data-tab="explore">Explore</button>
                <button class="notes-nav-btn" data-tab="search">Search & A-Z</button>
                <button class="notes-nav-btn" data-tab="saved">My Notes</button>
              </div>
              <div class="notes-search-wrap" id="notes-search-wrap" style="display:none">
                <div class="cat-search-wrap">
                  <input type="text" id="notes-search" class="cat-search-input" placeholder="Search notes...">
                  <button id="notes-search-clear" class="cat-search-clear" style="display:none">✕</button>
                </div>
                <div class="cat-sidebar-section" id="notes-tier-filter-wrap" style="display:none; margin-top:var(--sp-md)">
                  <div class="notes-tier-bar" id="notes-tier-bar">
                    <button class="tab active" data-tier="all">All Tiers</button>
                    <button class="tab" data-tier="top">Top</button>
                    <button class="tab" data-tier="mid">Heart</button>
                    <button class="tab" data-tier="base">Base</button>
                  </div>
                </div>
              </div>
              <div id="notes-count" class="notes-count-summary"></div>
              <div id="notes-body"></div>
            </div>
          </div>

          <div class="panel" id="p-changelog">
            <div class="changelog-container">
              <h1 class="text-title">Changelog</h1>
              <div id="changelog-body" class="changelog-body"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-detail" id="col-detail">
        <div class="detail-topbar">
          <button class="detail-back" id="detail-back" aria-label="Back">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back
          </button>
          <button class="detail-close-btn" id="detail-close-btn" onclick="closeDesktopDetail()" aria-label="Close details">✕</button>
        </div>
        <div class="detail-inner" id="detail-inner"></div>
      </div>
      <div class="detail-scrim" id="detail-scrim"></div>
    </div><!-- /.content-row -->
  </div>

  <div id="sheet-stack" class="sheet-stack-overlay">
    <div class="sheet-backdrop" id="sheet-backdrop"></div>
  </div>
  <div class="note-float-overlay" id="note-float-overlay">
    <div class="note-float-bg" id="note-float-bg"></div>
    <div class="note-popup" id="note-popup" role="dialog" aria-labelledby="np-name">
      <button class="nfp-close" id="nfp-close" aria-label="Close note info">✕</button>
      <div class="section-group">
        <div class="np-family" id="np-family"></div>
        <div class="np-name" id="np-name"></div>
        <div class="np-desc" id="np-desc"></div>
      </div>
      <div id="np-save"></div>
      <div class="section-group np-extra" id="np-extraction" style="display:none">
        <div class="sec-label">Extraction</div>
        <div class="np-extra-text" id="np-extraction-text"></div>
      </div>
      <div class="section-group np-extra" id="np-fact" style="display:none">
        <div class="sec-label">Insider Fact</div>
        <div class="np-extra-text" id="np-fact-text"></div>
      </div>
      <div id="np-frags"></div>
    </div>
  </div>

  <!-- Universal Search Modal -->
  <div id="universal-search" class="us-overlay" role="dialog" aria-modal="true"
       aria-label="Search fragrances, notes, and houses" hidden>
    <div class="us-backdrop"></div>
    <div class="us-modal">
      <div id="us-context" class="us-context" aria-live="polite" hidden></div>
      <div class="us-input-wrap">
        <svg class="us-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="us-input" type="text" class="us-input"
               placeholder="Search fragrances, notes, houses..."
               autocomplete="off" spellcheck="false"
               role="combobox" aria-expanded="true" aria-haspopup="listbox"
               aria-controls="us-results" aria-autocomplete="list">
        <button id="us-close" class="us-close" aria-label="Close search">✕</button>
      </div>
      <div id="us-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <div id="us-results" class="us-results" role="listbox" aria-label="Search results"></div>
      <div class="us-hint" aria-hidden="true">↵ open &nbsp;·&nbsp; ↑↓ navigate &nbsp;·&nbsp; esc close</div>
    </div>
  </div>

  <nav class="mobile-bottomnav">
    <a href="/app.html#catalog" class="mbn-btn"><span class="mbn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>Discovery</a>
    <button class="mbn-btn active" onclick="goMobile('compare', this)"><span class="mbn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M21 3l-7 7"/><path d="M3 3l7 7"/><path d="M16 21h5v-5"/><path d="M8 21H3v-5"/><path d="M21 21l-7-7"/><path d="M3 21l7-7"/></svg></span>Compare</button>
    <button class="mbn-btn" onclick="goMobile('notes', this)"><span class="mbn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/><path d="M10 2c1 .5 2 2 2 5"/></svg></span>Notes</button>
    <button class="mbn-btn" onclick="goMobile('saved', this)"><span class="mbn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>You</button>
  </nav>

  <div class="app-loading" id="app-loading">
    <div class="app-loading-inner">
      <div class="app-loading-dot"></div>
      <div class="app-loading-text">Building Engine...</div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
