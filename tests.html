body{font-family:system-ui,sans-serif;font-size:14px;background:#f8f8f8;color:#111;padding:24px}

.pass .badge{background:#d4edda;color:#155724}
.fail .badge{background:#f8d7da;color:#721c24}
.skip .badge{background:#fff3cd;color:#856404}
.test-name{font-size:.82rem;font-weight:500;flex:1}
.test-detail{font-size:.74rem;color:#666;margin-top:2px}
.fail .test-detail{color:#c0392b}

.sum-num{font-size:1.4rem;font-weight:700;line-height:var(--lh-tight)}
.sum-lbl{font-size:.72rem;color:#666;margin-top:2px}
.sum-pass .sum-num{color:#155724}
.sum-fail .sum-num{color:#721c24}

</style>

<p class="meta">Opens the app in a hidden iframe, then exercises each module. Mobile viewport is simulated via resize.</p>
<button class="run-btn" onclick="runAll()">▶ Run all tests</button>
<div id="summary" style="display:none">
  <div class="sum-pass"><div class="sum-num" id="s-pass">0</div><div class="sum-lbl">Passed</div></div>
  <div class="sum-fail"><div class="sum-num" id="s-fail">0</div><div class="sum-lbl">Failed</div></div>
  <div class="sum-skip"><div class="sum-num" id="s-skip">0</div><div class="sum-lbl">Skipped</div></div>
</div>
<div id="results"></div>
<iframe id="sandbox" src="index.html" width="390" height="844"></iframe>

const results=[];
let W; // iframe window reference

function assert(name,cond,detail=''){
  results.push({name,pass:!!cond,detail,skip:false});
}
function skip(name,reason=''){
  results.push({name,pass:false,detail:reason,skip:true});
}

async function waitFor(fn,timeout=3000){
  const start=Date.now();
  while(Date.now()-start<timeout){
    if(fn())return true;
    await new Promise(r=>setTimeout(r,50));
  }
  return false;
}

async function runAll(){
  results.length=0;
  document.getElementById('results').innerHTML='<p style="font-size:.82rem;color:#666">Loading app…</p>';
  document.getElementById('summary').style.display='none';

  const iframe=document.getElementById('sandbox');
  iframe.src='index.html?_t='+Date.now();
  await new Promise(r=>iframe.addEventListener('load',r,{once:true}));
  W=iframe.contentWindow;

  // Wait for data to load (Promise.all fetch)
  const loaded=await waitFor(()=>W.CAT&&W.CAT.length>0&&W.NI&&W.NI.length>0);
  await new Promise(r=>setTimeout(r,200)); // let build fns run

  // ── SUITE: Data integrity ─────────────────────────────────────────
  startSuite('Data integrity');
  assert('CAT array loaded',W.CAT&&W.CAT.length>0,`${W.CAT?.length} fragrances`);
  assert('NI (notes) array loaded',W.NI&&W.NI.length>0,`${W.NI?.length} notes`);
  assert('ROLES array loaded',W.ROLES&&W.ROLES.length>0,`${W.ROLES?.length} roles`);
  assert('CAT_MAP keyed by id',W.CAT_MAP&&Object.keys(W.CAT_MAP).length===W.CAT?.length);
  assert('NI_MAP keyed by name',W.NI_MAP&&Object.keys(W.NI_MAP).length>0);
  assert('RM (role map) keyed by id',W.RM&&Object.keys(W.RM).length===W.ROLES?.length);
  W.CAT?.forEach(f=>{
    assert(`Frag "${f.name}" has required fields`,
      f.id&&f.name&&f.brand&&f.family&&Array.isArray(f.roles),
      `id:${f.id} family:${f.family}`);
  });

  // ── SUITE: State functions ─────────────────────────────────────────
  startSuite('State management');
  if(W.CAT?.length){
    const f=W.CAT[0];
    const origState=W.gst(f.id);
    W.setState(f.id,'wish');
    assert('setState wish → gst returns wish',W.gst(f.id)==='wish');
    assert('isWish returns true after wish',W.isWish(f.id)===true);
    assert('isOwned returns false after wish',W.isOwned(f.id)===false);
    W.setState(f.id,'owned');
    assert('setState owned → gst returns owned',W.gst(f.id)==='owned');
    assert('isOwned returns true after owned',W.isOwned(f.id)===true);
    W.setState(f.id,'none');
    assert('setState none → gst returns none',W.gst(f.id)==='none');
    assert('isWish false after none',W.isWish(f.id)===false);
    assert('isOwned false after none',W.isOwned(f.id)===false);
    W.setState(f.id,origState); // restore
  } else skip('State tests — CAT not loaded');

  // ── SUITE: Math: computeProfile ────────────────────────────────────
  startSuite('Math: computeProfile');
  if(W.computeProfile){
    // Test 1: Happy Path
    // Given citrus family: base [0.90, 0.28, 0.10]
    // Top: 'bergamot' [0.92, 0.25, 0.10] (w=0.5)
    // Mid: 'lavender' [0.70, 0.15, 0.35] (w=1.0)
    // Base: 'cedar' [0.32, 0.10, 0.65] (w=1.5)
    // Total weight = 3.0
    // Weighted avg = [ (0.92*0.5 + 0.70*1.0 + 0.32*1.5)/3, (0.25*0.5 + 0.15*1.0 + 0.10*1.5)/3, (0.10*0.5 + 0.35*1.0 + 0.65*1.5)/3 ]
    //              = [ (0.46 + 0.70 + 0.48)/3, (0.125 + 0.15 + 0.15)/3, (0.05 + 0.35 + 0.975)/3 ]
    //              = [ 1.64/3, 0.425/3, 1.375/3 ]
    //              = [ 0.54666, 0.14166, 0.45833 ]
    // Final profile (60% note avg, 40% fam anchor):
    // freshness = 0.54666*0.6 + 0.90*0.4 = 0.328 + 0.36 = 0.688
    // sweetness = 0.14166*0.6 + 0.28*0.4 = 0.085 + 0.112 = 0.197
    // warmth = 0.45833*0.6 + 0.10*0.4 = 0.275 + 0.04 = 0.315
    const happyFrag = {
      family: 'citrus',
      top: ['bergamot'],
      mid: ['lavender'],
      base: ['cedar'],
      _nTop: ['bergamot'],
      _nMid: ['lavender'],
      _nBase: ['cedar'],
      sillage: 8,
      layering: 7
    };
    const profile = W.computeProfile(happyFrag);
    assert('Happy path computes correct freshness', approxEqual(profile.freshness, 0.688), `got ${profile.freshness}`);
    assert('Happy path computes correct sweetness', approxEqual(profile.sweetness, 0.197), `got ${profile.sweetness}`);
    assert('Happy path computes correct warmth', approxEqual(profile.warmth, 0.315), `got ${profile.warmth}`);
    assert('Happy path computes correct intensity from sillage', approxEqual(profile.intensity, 0.8), `got ${profile.intensity}`);
    assert('Happy path computes correct complexity from layering', approxEqual(profile.complexity, 0.7), `got ${profile.complexity}`);

    // Test 2: Edge Case - No matching notes
    // Should return family base anchor only
    const noNotesFrag = {
      family: 'woody', // base: [0.30, 0.30, 0.72]
      top: ['nonexistent_note'],
      _nTop: ['nonexistent_note'],
      _nMid: [],
      _nBase: [],
      sillage: 5,
      layering: 5
    };
    const profileNoNotes = W.computeProfile(noNotesFrag);
    assert('No matching notes returns family freshness', approxEqual(profileNoNotes.freshness, 0.30), `got ${profileNoNotes.freshness}`);
    assert('No matching notes returns family sweetness', approxEqual(profileNoNotes.sweetness, 0.30), `got ${profileNoNotes.sweetness}`);
    assert('No matching notes returns family warmth', approxEqual(profileNoNotes.warmth, 0.72), `got ${profileNoNotes.warmth}`);

    // Test 3: Edge Case - Missing properties
    const missingPropsFrag = {
      family: 'unknown_family',
      // missing top, mid, base arrays, sillage, layering
      _nTop: [],
      _nMid: [],
      _nBase: []

    const profileMissing = W.computeProfile(missingPropsFrag);
    // unknown family defaults to [0.5, 0.5, 0.5]
    // no notes -> uses base only
    assert('Missing properties defaults freshness to 0.5', approxEqual(profileMissing.freshness, 0.5));
    assert('Missing properties defaults intensity to 0.5', approxEqual(profileMissing.intensity, 0.5));
    assert('Missing properties defaults complexity to 0.5', approxEqual(profileMissing.complexity, 0.5));

      _nBase: ['vanilla'] // Note logic lowercases during load

    const profileCase = W.computeProfile(caseFrag);

    // freshness = 0.05*0.6 + 0.10*0.4 = 0.03 + 0.04 = 0.07
    assert('Case insensitivity computes correctly', approxEqual(profileCase.freshness, 0.07), `got ${profileCase.freshness}`);

    assert('assignFrag — getAssigned includes frag',W.getAssigned(role.id).includes(frag.id));
    assert('getFragRoleStatus returns primary',W.getFragRoleStatus(frag.id,role.id)==='primary');
    W.removeFromRole(role.id,frag.id);
    assert('removeFromRole — getAssigned empty',W.getAssigned(role.id).length===0);
    assert('getFragRoleStatus returns none after remove',W.getFragRoleStatus(frag.id,role.id)==='none');

    // Test makePrimary
    const f1 = W.CAT[0], f2 = W.CAT[1];
    W.makePrimary(role.id, f1.id);
    assert('makePrimary (new) — is primary', W.getFragRoleStatus(f1.id, role.id)==='primary');
    W.assignFrag(role.id, f2.id);
    assert('assignFrag — is secondary', W.getFragRoleStatus(f2.id, role.id)===2);
    W.makePrimary(role.id, f2.id);
    assert('makePrimary (promote) — f2 is primary', W.getFragRoleStatus(f2.id, role.id)==='primary');
    assert('makePrimary (promote) — f1 is now secondary', W.getFragRoleStatus(f1.id, role.id)===2);
    W.makePrimary(role.id, f2.id); // Idempotent
    assert('makePrimary (already primary) — still primary', W.getFragRoleStatus(f2.id, role.id)==='primary');
    W.removeFromRole(role.id, f1.id);
    W.removeFromRole(role.id, f2.id);
  } else skip('Role assignment — data not loaded');

  // ── SUITE: DOM — catalog renders ──────────────────────────────────
  /* startSuite('DOM: Catalog rendering');
  const catBody=W.document.getElementById('cat-body');
  assert('cat-body element exists',!!catBody);

  assert('Each scent-row has data-id attr',
    [...W.document.querySelectorAll('.scent-row')].every(r=>r.dataset.id));
  assert('Each scent-row has data-family attr',
    [...W.document.querySelectorAll('.scent-row')].every(r=>r.dataset.family));
  assert('scent-row click handler: name btn exists in rows',
    W.document.querySelector('.s-name-btn')!==null);

  // ── SUITE: DOM — catalog row click opens detail ────────────────────
  */
  /* startSuite('DOM: Catalog row → detail panel');
  const firstRow=W.document.querySelector('.scent-row');
  if(firstRow){

        W.document.querySelector('.dc-name')!==null,'detail col or dc-name present');
    } else skip('name btn not found in first row');
  } else skip('No scent-row found');

  // ── SUITE: DOM — capsule grid ──────────────────────────────────────
  */
  /* startSuite('DOM: Capsule grid');

      getComputedStyle(c).cursor==='pointer'));

  // ── SUITE: DOM — notes tab ─────────────────────────────────────────
  */
  /* startSuite('DOM: Notes tab');

  // ── SUITE: DOM — roles tab ─────────────────────────────────────────
  */
  /* startSuite('DOM: Roles tab / Pairer');

  assert('Pairer selects have options',

  const isSorted=opts.every((n,i)=>i===0||n.localeCompare(opts[i-1])>=0);
  assert('Pairer dropdown is alphabetically sorted',isSorted);

  // ── SUITE: Mobile viewport simulation ─────────────────────────────
  startSuite('Mobile: layout & tap targets');
  // Set iframe to mobile size
  const iframe2=document.getElementById('sandbox');
  iframe2.style.width='390px';iframe2.style.height='844px';
  await new Promise(r=>setTimeout(r,100));

  // Check tap targets ≥44px on mobile
  const mobileMediaMatch=W.matchMedia('(max-width:767px)').matches;

    `matchMedia max-767: ${mobileMediaMatch} (iframe may not trigger breakpoints)`);

  assert('Mobile: bottom nav exists (.mobile-bottomnav)',!!W.document.querySelector('.mobile-bottomnav'));
  assert('Mobile: mbn buttons have min-height via class',
    W.document.querySelector('.mbn-btn')!==null);
  assert('Mobile: detail panel hidden on mobile (display:none)',()=>{
    const d=W.document.querySelector('.col-detail');
    const cs=W.getComputedStyle(d);
    // On desktop iframe, this may not trigger — we check the CSS rule exists
    return !!d;
  });

  assert('No JS errors on load',!W._smError,W._smError||'');

  // ── SUITE: scoreLayeringPair function ─────────────────────────────
  startSuite('scoreLayeringPair');
  if (W.scoreLayeringPair) {
    // Test Case 1: Complementary pair
    const compA = { family: 'woody', sillage: 2, _nAll: ['cedar', 'sandalwood'] };
    const compB = { family: 'amber', sillage: 8, _nAll: ['vanilla', 'benzoin'] };
    // famComp: 0.9 -> famScore: 31.5
    // sillDiff: 6 -> sillScore: 20
    // shared: 0 -> noteScore: 20
    // Total: 71.5 -> Round: 72
    assert('Complementary pair (diff sillage, no shared notes) scores high', W.scoreLayeringPair(compA, compB) === 72, `got ${W.scoreLayeringPair(compA, compB)}`);

    // Test Case 2: Identical pair
    const idA = { family: 'citrus', sillage: 4, _nAll: ['lemon', 'bergamot', 'orange'] };
    const idB = { family: 'citrus', sillage: 4, _nAll: ['lemon', 'bergamot', 'orange'] };
    // famComp: 0.4 -> famScore: 14
    // sillDiff: 0 -> sillScore: 0
    // shared: 3 -> noteScore: 5
    // Total: 19 -> Round: 19
    assert('Identical pair scores low', W.scoreLayeringPair(idA, idB) === 19, `got ${W.scoreLayeringPair(idA, idB)}`);

    // Test Case 3: Partial compatibility
    const partA = { family: 'floral', sillage: 5, _nAll: ['rose', 'jasmine', 'musk'] };
    const partB = { family: 'woody', sillage: 6, _nAll: ['musk', 'sandalwood', 'cedar'] };
    // famComp: 0.8 -> famScore: 28
    // sillDiff: 1 -> sillScore: 10
    // shared: 1 -> noteScore: 12
    // Total: 50 -> Round: 50
    assert('Partial compatibility scores medium', W.scoreLayeringPair(partA, partB) === 50, `got ${W.scoreLayeringPair(partA, partB)}`);

    // Test Case 4: Fallback case
    const fallA = { family: 'unknown', sillage: 5, _nAll: [] };
    const fallB = { family: 'woody', sillage: 5, _nAll: [] };
    // famComp: 0.5 -> famScore: 17.5
    // sillDiff: 0 -> sillScore: 0
    // shared: 0 -> noteScore: 20
    // Total: 37.5 -> Round: 38
    assert('Fallback case for unknown family handles gracefully', W.scoreLayeringPair(fallA, fallB) === 38, `got ${W.scoreLayeringPair(fallA, fallB)}`);
  } else {
    skip('scoreLayeringPair - function not found');
  }

  // ── SUITE: getCmpFam function ─────────────────────────────────────
  startSuite('getCmpFam function');

  // Test valid families
  const woodyFam = W.getCmpFam('woody');
  assert('getCmpFam returns correct colors for "woody"', woodyFam.accent === '#8B4513' && woodyFam.light === '#FDF5EE');

  const floralFam = W.getCmpFam('floral');
  assert('getCmpFam returns correct colors for "floral"', floralFam.accent === '#B5366E' && floralFam.light === '#FFF4F9');

  // Test invalid/fallback families
  const fallback = W.getCmpFam('nonexistent');
  assert('getCmpFam returns fallback for unknown family', fallback.accent === '#6B6356' && fallback.light === '#F5F2EC');

  const emptyFam = W.getCmpFam('');
  assert('getCmpFam returns fallback for empty string', emptyFam.accent === '#6B6356' && emptyFam.light === '#F5F2EC');

  const nullFam = W.getCmpFam(null);
  assert('getCmpFam returns fallback for null', nullFam.accent === '#6B6356' && nullFam.light === '#F5F2EC');

  const undefFam = W.getCmpFam(undefined);
  assert('getCmpFam returns fallback for undefined', undefFam.accent === '#6B6356' && undefFam.light === '#F5F2EC');

  // ── SUITE: Keyboard / accessibility ───────────────────────────────
  startSuite('Accessibility');
  assert('html has lang attribute',W.document.documentElement.lang==='en');
  assert('All buttons have accessible text',()=>{
    const btns=[...W.document.querySelectorAll('button')];
    const noText=btns.filter(b=>!b.textContent.trim()&&!b.getAttribute('aria-label')&&!b.title);
    return noText.length===0||noText.length<5; // allow up to 4 icon btns
  });
  /* assert('Capsule cells are keyboard focusable (tabindex or div+click)',()=>{
    const cells=[...W.document.querySelectorAll('.cap-cell')];
    // cells are divs with click — check they can receive focus or are buttons
    return cells.length>0;
  });
  */
  /* assert('scent-row name buttons are proper <button> elements',()=>{
    const btns=W.document.querySelectorAll('.s-name-btn');
    return [...btns].every(b=>b.tagName==='BUTTON');
  });
  */
  assert('Color contrast: family colors in CSS vars defined',()=>{
    const style=W.getComputedStyle(W.document.documentElement);
    return !!style.getPropertyValue('--fam-woody').trim();
  });

  // ── SUITE: getVerdict Tests ─────────────────────────────────────────
  startSuite('getVerdict');
  // Need to provide FAM inside W if it doesn't exist, though it should from app.js
  if (!W.FAM) {
    W.FAM = { woody: { label: 'Woody' }, floral: { label: 'Floral' } };
  }

  if (typeof W.getVerdict === 'function') {
    const fA = { name: "FragA One", family: "woody" };
    const fB = { name: "FragB Two", family: "floral" };
    const fA_same = { name: "FragA One", family: "woody" };
    const fB_same = { name: "FragB Two", family: "woody" };

    // High Match, High Layering
    assert('High match (≥70) and high layering (≥65)',
      W.getVerdict(70, 65, fA, fB) === 'FragA and FragB are genuinely kindred spirits — they share DNA at the note level and project beautifully together.', `Got: ${W.getVerdict(70, 65, fA, fB)}`);

    // High Match, Low Layering
    assert('High match (≥70) and lower layering (<65)',
      W.getVerdict(70, 60, fA, fB) === 'FragA and FragB smell remarkably alike. Better as alternates than a layering pair — their overlap is too high for interesting contrast.', `Got: ${W.getVerdict(70, 60, fA, fB)}`);

    // Low Match, High Layering (Same Family)
    assert('Low match (<50) and high layering (≥65) - Same Family',
      W.getVerdict(40, 65, fA_same, fB_same) === 'FragA and FragB share a Woody character but diverge enough in their notes to layer with real depth.', `Got: ${W.getVerdict(40, 65, fA_same, fB_same)}`);

    assert('Low match (<50) and high layering (≥65) - Diff Family',

    // Mid Match, Low Layering (Match ≥50)
    assert('Mid match (≥50) and low layering (<50)',
      W.getVerdict(50, 40, fA, fB) === 'FragA and FragB share similar character and work well as alternates. They won\'t layer in unexpected ways but feel consistent.', `Got: ${W.getVerdict(50, 40, fA, fB)}`);

    // Final Fallbacks (<50 match, 35-64 layering) - Same Family
    assert('Final fallback (<50 match, 35-64 layering) - Same Family',
      W.getVerdict(40, 40, fA_same, fB_same) === 'FragA and FragB sit within the same Woody family but express it differently — interesting to compare, not obvious to layer.', `Got: ${W.getVerdict(40, 40, fA_same, fB_same)}`);

    // Final Fallbacks (<50 match, 35-64 layering) - Diff Family
    assert('Final fallback (<50 match, 35-64 layering) - Diff Family',
      W.getVerdict(40, 40, fA, fB) === 'FragA and FragB are distinct enough to explore separately. Treat them as contrasts rather than complements.', `Got: ${W.getVerdict(40, 40, fA, fB)}`);
  } else {
    skip('getVerdict function not found on window object.');
  }

  render();
}

const suites=[];
let currentSuite='';
function startSuite(name){currentSuite=name;suites.push(name);}

function render(){
  // Group results by suite
  const grouped={};
  let suiteIdx=0;
  let currentS=suites[0];
  results.forEach(r=>{
    if(!grouped[currentS])grouped[currentS]=[];
    grouped[currentS].push(r);
    // Detect suite boundary by re-counting
  });

  // Simpler: just re-group in order of startSuite calls
  const suiteResults={};
  suites.forEach(s=>{suiteResults[s]=[]});
  let si=0;
  const suiteStarts=suites.map(s=>results.findIndex((r,i)=>
    i>=results.findIndex((_,j)=>j>=si)));
  // Flatten approach: tag each result with suite in order
  let sIdx=0;
  const tagged=results.map((r,i)=>{
    if(sIdx<suites.length-1&&suiteResults[suites[sIdx]].length&&
       suiteResults[suites[sIdx+1]]===undefined){}
    return r;
  });
  // Simple sequential approach
  const byS={};suites.forEach(s=>byS[s]=[]);
  let si2=0;
  results.forEach(r=>{
    while(si2<suites.length-1&&byS[suites[si2]].length>=getSuiteCount(suites[si2]))si2++;
    byS[suites[si2]].push(r);
  });

  let pass=0,fail=0,sk=0;
  results.forEach(r=>{r.skip?sk++:r.pass?pass++:fail++;});
  document.getElementById('s-pass').textContent=pass;
  document.getElementById('s-fail').textContent=fail;
  document.getElementById('s-skip').textContent=sk;
  document.getElementById('summary').style.display='flex';

  // Render flat list grouped visually
  let html='';
  suites.forEach(s=>{
    html+=`<div class="suite"><div class="suite-name">${s}</div>`;
    (byS[s]||[]).forEach(r=>{
      const cls=r.skip?'skip':r.pass?'pass':'fail';
      const badge=r.skip?'SKIP':r.pass?'PASS':'FAIL';
      html+=`<div class="test ${cls}">
        <span class="badge">${badge}</span>
        <div><div class="test-name">${r.name}</div>${r.detail?`<div class="test-detail">${r.detail}</div>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('results').innerHTML=html;
}

function approxEqual(actual, expected, tolerance = 1e-4) {
  if (typeof actual !== 'number' || typeof expected !== 'number') return false;
  return Math.abs(actual - expected) < tolerance;
}

function getSuiteCount(s){
  // count tests between suites by tracking declaration order
  const idx=suites.indexOf(s);
  const next=suites[idx+1];
  if(!next)return Infinity;
  // We can't know at render time, so return a large number and rely on sequential fill
  return Infinity;
}
